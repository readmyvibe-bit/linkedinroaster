<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <!-- Background -->
  <rect width="1200" height="630" fill="#004182"/>

  <!-- Subtle diagonal lines -->
  <g opacity="0.03">
    <line x1="0" y1="0" x2="1200" y2="630" stroke="white" stroke-width="1"/>
    <line x1="200" y1="0" x2="1200" y2="500" stroke="white" stroke-width="1"/>
    <line x1="0" y1="130" x2="1200" y2="630" stroke="white" stroke-width="1"/>
    <line x1="0" y1="260" x2="1000" y2="630" stroke="white" stroke-width="1"/>
  </g>

  <!-- Orange accent line at top -->
  <rect x="0" y="0" width="1200" height="6" fill="#E16B00"/>

  <!-- Flame icon centered above text -->
  <g transform="translate(556, 100)">
    <path d="M44 100C20 100 0 80 0 56c0-16 7-28 17-37 4-4 7-8 10-12 3 4 6 8 10 12 10 9 17 21 17 37 0 24-20 44-44 44h34z" fill="#E16B00"/>
    <path d="M44 88c-11 0-20-9-20-20 0-9 4.5-16.5 10-23 2-2 4-5 5.5-7.5 1.5 2.5 3.5 5.5 5.5 7.5 5.5 6.5 10 14 10 23 0 11-9 20-20 20h9z" fill="#F59E0B"/>
    <path d="M44 76c-5.5 0-11-5-11-11 0-6 3-9 7-13 1-1 2-2.5 3-4 1 1.5 2 3 3 4 4 4 7 7 7 13 0 6-5.5 11-11 11h2z" fill="#FCD34D"/>
  </g>

  <!-- Brand name centered -->
  <text x="600" y="290" font-family="Inter, -apple-system, Helvetica, sans-serif" font-size="62" font-weight="600" text-anchor="middle" letter-spacing="-1.5">
    <tspan fill="white">Profile</tspan><tspan fill="#E16B00" font-weight="800">Roaster</tspan><tspan fill="rgba(255,255,255,0.35)" font-weight="400">.in</tspan>
  </text>

  <!-- Tagline -->
  <text x="600" y="340" font-family="Inter, -apple-system, Helvetica, sans-serif" font-size="20" font-weight="400" fill="rgba(255,255,255,0.45)" text-anchor="middle" letter-spacing="5">AI-POWERED LINKEDIN PROFILE ANALYSIS</text>

  <!-- Divider line -->
  <rect x="540" y="370" width="120" height="2" rx="1" fill="rgba(255,255,255,0.1)"/>

  <!-- URL below -->
  <text x="600" y="410" font-family="Inter, Helvetica, sans-serif" font-size="16" font-weight="500" fill="rgba(255,255,255,0.2)" text-anchor="middle">profileroaster.in</text>

  <!-- Bottom bar -->
  <rect x="0" y="580" width="1200" height="50" fill="rgba(0,0,0,0.2)"/>

  <!-- Bottom stats -->
  <text x="200" y="612" font-family="Inter, Helvetica, sans-serif" font-size="15" font-weight="700" fill="rgba(255,255,255,0.65)" text-anchor="middle">500+ Profiles Improved</text>
  <text x="400" y="612" font-family="Inter, Helvetica, sans-serif" font-size="15" font-weight="400" fill="rgba(255,255,255,0.2)" text-anchor="middle">|</text>
  <text x="600" y="612" font-family="Inter, Helvetica, sans-serif" font-size="15" font-weight="700" fill="rgba(255,255,255,0.65)" text-anchor="middle">+42 Avg Score Improvement</text>
  <text x="800" y="612" font-family="Inter, Helvetica, sans-serif" font-size="15" font-weight="400" fill="rgba(255,255,255,0.2)" text-anchor="middle">|</text>
  <text x="1000" y="612" font-family="Inter, Helvetica, sans-serif" font-size="15" font-weight="700" fill="rgba(255,255,255,0.65)" text-anchor="middle">Results in 60 Seconds</text>

  <!-- Orange bottom accent -->
  <rect x="0" y="624" width="1200" height="6" fill="#E16B00"/>
</svg>
