    <path d="M60 108c-7.5 0-15-6-15-15 0-7.5 4.5-12 9-18 1.5-1.5 3-3 4-5 1 2 2.5 3.5 4 5 4.5 6 9 10.5 9 18 0 9-7.5 15-15 15h4z" fill="#FCD34D"/>
  </g>

  <!-- Brand name: profileRoaster.in -->
