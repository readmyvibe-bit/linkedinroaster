<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <!-- Background -->
  <rect width="1200" height="630" fill="#004182"/>

  <!-- Subtle diagonal lines -->
  <g opacity="0.03">
    <line x1="0" y1="0" x2="1200" y2="630" stroke="white" stroke-width="1"/>
    <line x1="200" y1="0" x2="1200" y2="500" stroke="white" stroke-width="1"/>
    <line x1="0" y1="130" x2="1200" y2="630" stroke="white" stroke-width="1"/>
    <line x1="0" y1="260" x2="1000" y2="630" stroke="white" stroke-width="1"/>
  </g>

  <!-- Orange accent line at top -->
  <rect x="0" y="0" width="1200" height="6" fill="#E16B00"/>

  <!-- CENTERED GROUP: flame + text aligned on same baseline -->
  <!-- Total width: flame 60px + gap 14px + text ~540px = ~614px -->
  <!-- Center at x=600: start at x = 600 - 307 = 293 -->

  <!-- Flame icon — top aligned with text cap height -->
  <!-- Flame center x = 293 + 30 = 323, vertical center at y=260 -->
  <g transform="translate(293, 228)">
    <!-- Outer flame: center x=30, height 64 -->
    <path d="M30 0 C30 0 26 7.5 24 11 C20 17.5 14 24 14 33 C14 42 21 49 30 49 C39 49 46 42 46 33 C46 24 40 17.5 36 11 C34 7.5 30 0 30 0Z" fill="#E16B00"/>
    <!-- Inner flame -->
    <path d="M30 10 C30 10 27.5 15 26.2 17.5 C23 22.5 19 27 19 32.5 C19 38.5 24 43 30 43 C36 43 41 38.5 41 32.5 C41 27 37 22.5 33.8 17.5 C32.5 15 30 10 30 10Z" fill="#F59E0B"/>
    <!-- Core flame -->
    <path d="M30 18 C30 18 28.2 21.5 27.5 23 C25.5 26 24 29 24 32 C24 35.5 26.5 38 30 38 C33.5 38 36 35.5 36 32 C36 29 34.5 26 32.5 23 C31.8 21.5 30 18 30 18Z" fill="#FCD34D"/>
  </g>

  <!-- Brand name — tight after flame, vertically centered with flame -->
  <!-- Flame bottom at y=277, text baseline needs to match flame vertical center y=252 -->
  <text x="357" y="270" font-family="Inter, -apple-system, Helvetica, sans-serif" font-size="62" font-weight="600" letter-spacing="-1.5">
    <tspan fill="white">Profile</tspan><tspan fill="#E16B00" font-weight="800">Roaster</tspan><tspan fill="rgba(255,255,255,0.35)" font-weight="400">.in</tspan>
  </text>

  <!-- Tagline centered -->
  <text x="600" y="330" font-family="Inter, -apple-system, Helvetica, sans-serif" font-size="20" font-weight="400" fill="rgba(255,255,255,0.45)" text-anchor="middle" letter-spacing="5">AI-POWERED LINKEDIN PROFILE ANALYSIS</text>

  <!-- Divider line -->
  <rect x="540" y="358" width="120" height="2" rx="1" fill="rgba(255,255,255,0.1)"/>

  <!-- URL below -->
  <text x="600" y="396" font-family="Inter, Helvetica, sans-serif" font-size="16" font-weight="500" fill="rgba(255,255,255,0.2)" text-anchor="middle">profileroaster.in</text>

  <!-- Bottom bar -->
  <rect x="0" y="580" width="1200" height="50" fill="rgba(0,0,0,0.2)"/>

  <!-- Bottom stats -->
  <text x="200" y="612" font-family="Inter, Helvetica, sans-serif" font-size="15" font-weight="700" fill="rgba(255,255,255,0.65)" text-anchor="middle">500+ Profiles Improved</text>
  <text x="400" y="612" font-family="Inter, Helvetica, sans-serif" font-size="15" font-weight="400" fill="rgba(255,255,255,0.2)" text-anchor="middle">|</text>
  <text x="600" y="612" font-family="Inter, Helvetica, sans-serif" font-size="15" font-weight="700" fill="rgba(255,255,255,0.65)" text-anchor="middle">+42 Avg Score Improvement</text>
  <text x="800" y="612" font-family="Inter, Helvetica, sans-serif" font-size="15" font-weight="400" fill="rgba(255,255,255,0.2)" text-anchor="middle">|</text>
  <text x="1000" y="612" font-family="Inter, Helvetica, sans-serif" font-size="15" font-weight="700" fill="rgba(255,255,255,0.65)" text-anchor="middle">Results in 60 Seconds</text>

  <!-- Orange bottom accent -->
  <rect x="0" y="624" width="1200" height="6" fill="#E16B00"/>
</svg>
