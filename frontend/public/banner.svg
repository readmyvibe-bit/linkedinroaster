  <text x="460" y="612" font-family="Inter, Helvetica, sans-serif" font-size="16" font-weight="400" fill="rgba(255,255,255,0.3)" text-anchor="middle">|</text>
  <text x="600" y="612" font-family="Inter, Helvetica, sans-serif" font-size="16" font-weight="700" fill="rgba(255,255,255,0.7)" text-anchor="middle">+42 Avg Score Improvement</text>
  <text x="740" y="612" font-family="Inter, Helvetica, sans-serif" font-size="16" font-weight="400" fill="rgba(255,255,255,0.3)" text-anchor="middle">|</text>
  <text x="900" y="612" font-family="Inter, Helvetica, sans-serif" font-size="16" font-weight="700" fill="rgba(255,255,255,0.7)" text-anchor="middle">Results in 60 Seconds</text>

