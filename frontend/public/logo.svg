<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 72" fill="none">
  <!-- Premium background -->
  <rect width="440" height="72" rx="12" fill="#FAFBFC"/>
  <rect x="0.5" y="0.5" width="439" height="71" rx="11.5" stroke="#E5E7EB" stroke-width="1" fill="none"/>

  <!-- Subtle top accent -->
  <rect x="0" y="0" width="440" height="3" rx="12" fill="#004182"/>
  <rect x="0" y="0" width="180" height="3" rx="0" fill="#E16B00"/>

  <!-- Centered group: flame + text -->
  <!-- Total content width ~340px, centered in 440: starts at (440-340)/2 = 50 -->

  <!-- Flame icon — premium with glow effect -->
  <g transform="translate(56, 14)">
    <!-- Glow base -->
    <ellipse cx="22" cy="42" rx="16" ry="6" fill="#E16B00" opacity="0.08"/>
    <!-- Outer flame -->
    <path d="M22 2 C22 2 18.5 8 16.5 11.5 C13 17 8 22 8 29 C8 36 13.5 42 22 42 C30.5 42 36 36 36 29 C36 22 31 17 27.5 11.5 C25.5 8 22 2 22 2Z" fill="#E16B00"/>
    <!-- Inner flame -->
    <path d="M22 10 C22 10 19.8 14 18.5 16.5 C15.5 21 12.5 25 12.5 29.5 C12.5 34 16.5 38 22 38 C27.5 38 31.5 34 31.5 29.5 C31.5 25 28.5 21 25.5 16.5 C24.2 14 22 10 22 10Z" fill="#F59E0B"/>
    <!-- Core flame -->
    <path d="M22 17 C22 17 20.5 20 19.8 21.5 C18 24 16.5 26.5 16.5 29 C16.5 32 19 34.5 22 34.5 C25 34.5 27.5 32 27.5 29 C27.5 26.5 26 24 24.2 21.5 C23.5 20 22 17 22 17Z" fill="#FCD34D"/>
  </g>

  <!-- Text: ProfileRoaster.in — vertically centered -->
  <text x="110" y="45" font-family="Inter, -apple-system, Helvetica, Arial, sans-serif" font-size="26" letter-spacing="-0.5">
    <tspan font-weight="600" fill="#0F172A">Profile</tspan><tspan font-weight="800" fill="#E16B00">Roaster</tspan><tspan font-weight="400" fill="#94A3B8">.in</tspan>
  </text>

  <!-- Subtle divider before .in -->
  <rect x="324" y="28" width="1" height="18" rx="0.5" fill="#E2E8F0"/>
</svg>
